# Tool Name
name: ""

# Tool version
version: ""

# URL Endpoint to listen on
mcp_route: ""

# Description shown to the MCP client
description: ""

# Map of APIs, keyed by the mcp_route the tool caller uses to select this API.
# e.g. passing mcp_route: "/proxmox" targets the entry below.
apis:
  /example:
    # Description of this API shown to the MCP client via list_routes.
    # Do NOT include api_server_url or other sensitive values here — this is returned to the model.
    description: ""

    # Base URL of the upstream API server. The endpoint from the tool call is appended to this.
    # Never exposed to the model — always redacted from responses and error messages automatically.
    api_server_url: ""

    # Authorization headers injected into every request to this API.
    # Values are AES-256-GCM encrypted strings (base64). Use encrypt.sh to generate them.
    # Decrypted values are automatically redacted from all responses.
    authorization:
      headers:
        Authorization: "..."

    # -------------------------------------------------------------------------
    # Request filtering
    # -------------------------------------------------------------------------

    # Headers that tool callers are NOT allowed to set.
    # Stripped from caller-supplied headers before config authorization headers are applied.
    blocked_headers: []

    routes:
      # Requests must match at least one allow rule to proceed.
      allow:
        - # HTTP methods permitted by this rule.
          methods:
            - GET
          # Regexes tested against the request endpoint path.
          # A request must match at least one to pass this rule.
          api_endpoint_matchers:
            - ^/api/.*

      # Requests matching any deny rule are rejected, regardless of allow rules.
      deny: []

    # -------------------------------------------------------------------------
    # Response filtering — applied in order: fields first, then scrub patterns.
    # -------------------------------------------------------------------------

    # REACTIVE — denylist of JSON field names always stripped from responses.
    # Use this to suppress specific known-sensitive fields when you still want
    # most of the response to pass through. Applied even when allow_fields is set.
    #
    # Example: always strip ssl fingerprints and auth tickets
    # deny_fields:
    #   - ssl_fingerprint
    #   - ticket
    #   - CSRFPreventionToken
    deny_fields: []

    # REACTIVE — regex patterns (with implicit global flag) matched against the
    # raw response text after field filtering. Matches are replaced with [REDACTED].
    # Use this for sensitive values that appear inline in strings rather than as
    # discrete JSON fields (e.g. a token identity embedded in a task ID string).
    # The backend URL and decrypted auth header values are always scrubbed automatically
    # without needing to be listed here.
    #
    # Example: redact Proxmox PAM token identities embedded in UPIDs
    # scrub_response:
    #   - "[\\w.]+@pam![\\w-]+"
    scrub_response: []
